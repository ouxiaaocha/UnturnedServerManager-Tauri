<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <circle cx="24" cy="24" r="22" fill="#e8f5f2"/>
  <!-- Terminal window -->
  <rect x="7" y="10" width="34" height="26" rx="3" stroke="#4cada8" stroke-width="2" fill="white"/>
  <!-- Title bar -->
  <rect x="7" y="10" width="34" height="5" rx="3" fill="#4cada8" opacity="0.15"/>
  <circle cx="12" cy="12.5" r="1" fill="#4cada8"/>
  <circle cx="16" cy="12.5" r="1" fill="#4cada8" opacity="0.6"/>
  <circle cx="20" cy="12.5" r="1" fill="#4cada8" opacity="0.3"/>
  <!-- Command prompt -->
  <text x="12" y="22" font-family="monospace" font-size="5" fill="#4cada8">&gt;_</text>
  <!-- Response lines -->
  <rect x="12" y="25" width="24" height="1.5" rx="0.5" fill="#4cada8" opacity="0.2"/>
  <rect x="12" y="28" width="18" height="1.5" rx="0.5" fill="#4cada8" opacity="0.15"/>
  <rect x="12" y="31" width="22" height="1.5" rx="0.5" fill="#4cada8" opacity="0.1"/>
  <!-- Connection indicator -->
  <circle cx="37" cy="12.5" r="1.5" fill="#52c41a"/>
</svg>